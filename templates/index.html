<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 智能简历生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f7f9;
    --surface: #ffffff;
    --border: #e4e6ea;
    --text: #111318;
    --text-2: #5a6070;
    --accent: #2563eb;
    --accent-bg: #eff4ff;
    --danger: #dc2626;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── 顶栏 ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .logo { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { width: 16px; height: 16px; fill: #fff; }
  .header-tag { font-size: 12px; background: var(--accent-bg); color: var(--accent); padding: 3px 10px; border-radius: 20px; font-weight: 500; }

  /* ── 主体布局 ── */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 36px 24px 60px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .page-title { font-size: 28px; font-weight: 600; }
  .page-sub { color: var(--text-2); font-size: 15px; margin-top: 6px; }

  /* ── 标签切换 ── */
  .tabs { display: flex; gap: 4px; background: var(--border); border-radius: 10px; padding: 4px; width: fit-content; }
  .tab-btn {
    font-family: inherit; font-size: 14px; font-weight: 500;
    border: none; cursor: pointer; border-radius: 7px;
    padding: 8px 20px; background: transparent; color: var(--text-2);
    transition: all .15s;
  }
  .tab-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.1); }

  /* ── 卡片 ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); }

  /* ── 表单 ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 13px; font-weight: 500; color: var(--text-2); }
  input[type=text], input[type=email], textarea {
    font-family: inherit; font-size: 14px;
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 13px; background: var(--surface); color: var(--text);
    outline: none; transition: border-color .15s, box-shadow .15s; resize: vertical;
  }
  input[type=text]:focus, input[type=email]:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,.1);
  }
  textarea { min-height: 90px; line-height: 1.6; }
  .field-hint { font-size: 12px; color: var(--text-2); margin-top: 2px; }

  /* ── 上传区 ── */
  .upload-zone {
    border: 1.5px dashed var(--border); border-radius: 10px;
    padding: 36px 20px; text-align: center;
    cursor: pointer; transition: all .15s; position: relative;
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: var(--accent-bg); }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 28px; margin-bottom: 8px; }
  .upload-text { font-size: 14px; font-weight: 500; }
  .upload-sub { font-size: 12px; color: var(--text-2); margin-top: 4px; }
  .upload-filename { font-size: 13px; color: var(--accent); font-weight: 500; margin-top: 8px; display: none; }

  /* ── 按钮 ── */
  .btn {
    font-family: inherit; font-size: 15px; font-weight: 500;
    border: none; cursor: pointer; border-radius: 9px;
    padding: 12px 28px; transition: all .15s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--bg); }

  .btn-row { display: flex; gap: 10px; align-items: center; margin-top: 8px; }

  /* ── 状态 ── */
  .status { font-size: 13px; color: var(--text-2); display: none; align-items: center; gap: 8px; }
  .status.show { display: flex; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: var(--danger); font-size: 13px; display: none; }
  .error-msg.show { display: block; margin-top: 8px; }

  /* ── 分区标题 ── */
  .section-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content:''; flex:1; height:1px; background: var(--border); }

  @media(max-width:600px) {
    main { padding: 20px 16px 48px; }
    header { padding: 0 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM8 13h8v1.5H8V13zm0 3h8v1.5H8V16zm0-6h3v1.5H8V10z"/></svg>
    </div>
    AI 简历生成器
  </div>
  <span class="header-tag">由 DeepSeek 驱动</span>
</header>

<main>
  <div>
    <h1 class="page-title">生成你的专业简历</h1>
    <p class="page-sub">填写信息或上传旧简历，AI 帮你生成 + 润色，一键导出 PDF</p>
  </div>

  <!-- 标签切换 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('new')">✦ 全新生成</button>
    <button class="tab-btn" onclick="switchTab('polish')">↑ 润色旧简历</button>
  </div>

  <!-- ── 全新生成 ── -->
  <div id="tab-new">
    <div class="card">
      <div class="section-title">基本信息</div>
      <div class="form-grid">
        <div class="form-group">
          <label>姓名 *</label>
          <input type="text" id="name" placeholder="张三">
        </div>
        <div class="form-group">
          <label>求职岗位 *</label>
          <input type="text" id="target_job" placeholder="产品经理 / 前端工程师 / 数据分析师…">
        </div>
        <div class="form-group full">
          <label>联系方式</label>
          <input type="text" id="contact" placeholder="邮箱 | 电话 | GitHub | 城市">
        </div>
        <div class="form-group full">
          <label>个人简介</label>
          <textarea id="summary" placeholder="3 年产品经验，擅长用户研究与需求分析…（不填则 AI 自动生成）"></textarea>
        </div>
      </div>

      <div class="section-title" style="margin-top:24px">经历与技能</div>
      <div class="form-grid">
        <div class="form-group full">
          <label>工作经历</label>
          <textarea id="experience" rows="5" placeholder="公司 A（2022-2024）- 产品经理&#10;负责 xx 产品从 0 到 1，DAU 增长 50%&#10;&#10;公司 B（2020-2022）- 产品实习生&#10;…"></textarea>
        </div>
        <div class="form-group full">
          <label>教育背景</label>
          <textarea id="education" placeholder="XX 大学 - 计算机科学 - 本科（2016-2020）"></textarea>
        </div>
        <div class="form-group">
          <label>技能</label>
          <textarea id="skills" rows="3" placeholder="Figma, SQL, Python, 用户访谈, A/B 测试…"></textarea>
        </div>
        <div class="form-group">
          <label>项目经历（可选）</label>
          <textarea id="projects" rows="3" placeholder="独立开发 xx 工具，GitHub 500+ star…"></textarea>
        </div>
      </div>

      <div class="btn-row" style="margin-top:24px">
        <button class="btn btn-primary" id="gen-btn" onclick="generateResume()">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 14.93V15a1 1 0 0 0-2 0v1.93A8 8 0 0 1 4.07 11H6a1 1 0 0 0 0-2H4.07A8 8 0 0 1 11 4.07V6a1 1 0 0 0 2 0V4.07A8 8 0 0 1 19.93 11H18a1 1 0 0 0 0 2h1.93A8 8 0 0 1 13 16.93z"/></svg>
          AI 生成简历
        </button>
        <div class="status" id="gen-status"><div class="spinner"></div> AI 正在生成简历，请稍候…</div>
      </div>
      <div class="error-msg" id="gen-error"></div>
    </div>
  </div>

  <!-- ── 润色旧简历 ── -->
  <div id="tab-polish" style="display:none">
    <div class="card">
      <div class="section-title">上传旧简历</div>
      <div class="form-grid">
        <div class="form-group full">
          <label>目标岗位</label>
          <input type="text" id="polish-job" placeholder="产品经理 / 前端工程师（留空则通用润色）">
        </div>
        <div class="form-group full">
          <label>上传文件（支持 .pdf / .docx / .txt，最大 5MB）</label>
          <div class="upload-zone" id="upload-zone">
            <input type="file" id="resume-file" accept=".pdf,.docx,.txt" onchange="onFileSelect(this)">
            <div class="upload-icon">📄</div>
            <div class="upload-text">点击或拖拽上传</div>
            <div class="upload-sub">.pdf / .docx / .txt，最大 5MB</div>
            <div class="upload-filename" id="upload-filename"></div>
          </div>
        </div>
      </div>
      <div class="btn-row" style="margin-top:24px">
        <button class="btn btn-primary" id="polish-btn" onclick="polishResume()">
          <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm17.71-10.21a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          AI 润色简历
        </button>
        <div class="status" id="polish-status"><div class="spinner"></div> AI 正在润色，请稍候…</div>
      </div>
      <div class="error-msg" id="polish-error"></div>
    </div>
  </div>
</main>

<!-- 结果预览（隐藏，生成后显示） -->
<div id="result-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:100; overflow-y:auto; padding:32px 16px;">
  <div style="max-width:820px; margin:0 auto; background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.2);">
    <div style="display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid #e4e6ea; background:#fff; position:sticky; top:0; z-index:1;">
      <span style="font-size:16px; font-weight:600;">简历预览</span>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-outline" onclick="downloadWord()" id="word-btn">⬇ 下载 Word</button>
        <button class="btn btn-outline" onclick="closeResult()">✕ 关闭</button>
      </div>
    </div>
    <div id="resume-preview" style="padding:40px 52px; font-family:'Noto Sans SC', sans-serif; line-height:1.8; color:#111;"></div>
  </div>
</div>

<script>
  let currentResumeHtml = '';
  let currentName = '简历';

  function switchTab(tab) {
    document.getElementById('tab-new').style.display = tab === 'new' ? '' : 'none';
    document.getElementById('tab-polish').style.display = tab === 'polish' ? '' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0) === (tab === 'new'));
    });
  }

  function onFileSelect(input) {
    const file = input.files[0];
    if (!file) return;
    const el = document.getElementById('upload-filename');
    el.textContent = '已选择：' + file.name;
    el.style.display = 'block';
  }

  // 拖拽上传
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) {
      document.getElementById('resume-file').files = e.dataTransfer.files;
      onFileSelect(document.getElementById('resume-file'));
    }
  });

  async function generateResume() {
    const name = document.getElementById('name').value.trim();
    if (!name) { showError('gen-error', '请填写姓名'); return; }

    const btn = document.getElementById('gen-btn');
    setLoading('gen', true, btn);

    const form = new FormData();
    ['name','target_job','contact','summary','experience','education','skills','projects']
      .forEach(k => form.append(k, document.getElementById(k).value));

    try {
      const res = await fetch('/generate', { method: 'POST', body: form });
      const data = await res.json();
      if (data.error) { showError('gen-error', data.error); return; }
      currentResumeHtml = data.html;
      currentName = data.name;
      showResult(data.html);
    } catch (e) {
      showError('gen-error', '请求失败，请检查网络');
    } finally {
      setLoading('gen', false, btn);
    }
  }

  async function polishResume() {
    const file = document.getElementById('resume-file').files[0];
    if (!file) { showError('polish-error', '请先上传简历文件'); return; }

    const btn = document.getElementById('polish-btn');
    setLoading('polish', true, btn);

    const form = new FormData();
    form.append('resume_file', file);
    form.append('target_job', document.getElementById('polish-job').value);

    try {
      const res = await fetch('/polish', { method: 'POST', body: form });
      const data = await res.json();
      if (data.error) { showError('polish-error', data.error); return; }
      currentResumeHtml = data.html;
      showResult(data.html);
    } catch (e) {
      showError('polish-error', '请求失败，请检查网络');
    } finally {
      setLoading('polish', false, btn);
    }
  }

  async function downloadWord() {
    const btn = document.getElementById('word-btn');
    btn.disabled = true; btn.textContent = '生成中…';
    try {
      const res = await fetch('/download-word', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ html: currentResumeHtml, name: currentName }),
      });
      if (!res.ok) { const d = await res.json(); alert(d.error); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${currentName}_简历.docx`; a.click();
      URL.revokeObjectURL(url);
    } catch (e) {
      alert('Word 下载失败：' + e.message);
    } finally {
      btn.disabled = false; btn.textContent = '⬇ 下载 Word';
    }
  }

  function showResult(html) {
    document.getElementById('resume-preview').innerHTML = injectResumeStyles() + html;
    document.getElementById('result-overlay').style.display = '';
    document.body.style.overflow = 'hidden';
  }

  function closeResult() {
    document.getElementById('result-overlay').style.display = 'none';
    document.body.style.overflow = '';
  }

  function injectResumeStyles() {
    return `<style>
      .resume-section { margin-bottom: 22px; }
      .resume-section h2 { font-size: 16px; font-weight: 600; border-bottom: 2px solid #2563eb; padding-bottom: 5px; margin-bottom: 12px; color: #111; }
      .resume-section#profile h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
      .resume-section#profile p { color: #555; font-size: 13px; }
      .resume-item { margin-bottom: 14px; }
      .resume-item h3 { font-size: 14px; font-weight: 600; }
      .resume-item .meta { font-size: 12px; color: #666; margin-bottom: 4px; }
      .resume-item ul { padding-left: 18px; font-size: 13px; color: #333; }
      .resume-item ul li { margin-bottom: 3px; }
      p { font-size: 13px; color: #333; line-height: 1.8; }
    </style>`;
  }

  function setLoading(id, loading, btn) {
    document.getElementById(`${id}-status`).classList.toggle('show', loading);
    document.getElementById(`${id}-error`).classList.remove('show');
    btn.disabled = loading;
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = '错误：' + msg;
    el.classList.add('show');
  }
</script>
</body>
</html>
